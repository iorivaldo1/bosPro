<!DOCTYPE html>

    <div id="threejs"></div>

        const container = $('#threejs');
        const width = container.width();
        const height = container.height();

        const scene = new THREE.Scene();

        // 调整摄像机位置以容纳两个平面

        renderer.setSize(width, height);
        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

            void main() {
                // float left = step(0.1,vUv.x);

                // pct *= tr2.x * tr2.y;

                //右上角
                // vec2 bl1 = step(vec2(0.8, 0.0), vUv);

                // float pct = bl1.x * bl1.y * tr1.x * tr1.y;

                //右下角
                vec2 bl1 = step(vec2(0.8, 0.5), vUv);
                vec2 tr1 = step(vec2(0.0, 0.0), 1.0 - vUv);
                float pct = bl1.x * bl1.y * tr1.x * tr1.y;

                vec3 color = vec3(pct);

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const material1 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader1,
        });

        const fragmentShader2 = `
            varying vec2 vUv;
            void main() {
                vec3 rectColor = vec3(0.2,0.7,0.9); 

                vec2 bl1 = step(vec2(0.0,0.0), vUv);
                vec2 tr1 = step(vec2(0.7,0.6),1.0 - vUv);
                float pct1 = bl1.x * bl1.y * tr1.x * tr1.y;

                vec2 bl2 = step(vec2(0.8,0.5), vUv);
                vec2 tr2 = step(vec2(0.0,0.0), 1.0 - vUv);
                float pct2 = bl2.x * bl2.y * tr2.x * tr2.y;

                vec2 bl3 = step(vec2(0.0,0.7), vUv);
                vec2 tr3 = step(vec2(0.9,0.0), 1.0 - vUv);
                float pct3 = bl3.x * bl3.y * tr3.x * tr3.y;

                vec2 bl4 = step(vec2(0.9,0.0),vUv);
                vec2 tr4 = step(vec2(0.0,0.8),1.0-vUv);
                float pct4 = bl4.x * bl4.y * tr4.x * tr4.y;

                float pct = max(pct1, pct2);
                pct = max(pct,pct3);
                pct = max(pct,pct4);

                // vec3 color = vec3(pct * rectColor);
                vec3 color = mix(vec3(1.0),rectColor,pct);


                gl_FragColor = vec4(color,1.0);
            }
        `;

        const material2 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader2,

        const fragmentShader3 = `
            varying vec2 vUv;
            
            float drawRect(vec2 uv, vec2 center, vec2 size) {
                vec2 d = abs(uv - center) - size / 2.0;
                float res =  step(max(d.x, d.y), 0.0);
                return res;
            }
            void main() {
                float pct1 = drawRect(vUv, vec2(0.5, 0.25), vec2(0.3, 0.2));
                float pct2 = drawRect(vUv, vec2(0.9, 0.25), vec2(0.2, 0.5));

        const fragmentShader17 = `

        const fragmentShader18 = `
            #define PI 3.1415926535
            varying vec2 vUv;
            void main() {
                // vec2 pos = vec2(0.5) - vUv;
                // float r = length(pos)*2.0;
                // float a = atan(pos.y,pos.x);
                // float f = sin(a *1.0);
                // vec3 color = vec3(1.0 - smoothstep(f,f+0.02,r));

                float p = 0.3; //距离场的中心
                float r = length(vUv - p);
                float a = atan(vUv.y - p,vUv.x - p);
                // float f = abs(sin(a *3.0)) * 0.2; //3.0叶片数量 0.2叶片半径
                float f = sin((a+0.3) *3.0) * 0.2; //3.0叶片数量 0.2叶片半径，+0.3叶片旋转

                vec3 color = vec3(1.0 - smoothstep(f,f+0.02,r));

        `
        const material18 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,

        const fragmentShader19 = `
            #define PI 3.1415926535
            varying vec2 vUv;
            uniform float u_time;
            void main() {
                float p = 0.3; 
                float r = length(vUv - p);
                float a = atan(vUv.y - p,vUv.x - p);
                // float f = sin(u_time * a *3.0) * 0.2; 
                float f = sin((u_time + a) *3.0) * 0.2; 
                vec3 color = vec3(1.0 - smoothstep(f,f+0.02,r));

        const material19 = new THREE.ShaderMaterial({

        const fragmentShader20 = `

            varying vec2 vUv;

                float p = 0.15; 
                float a = atan(vUv.y - p,vUv.x - p);

                int N = 3;

                int N = 3;

        const fragmentShader22 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;

            float triangleSDF(vec2 uv, vec2 center){
                vec2 p = uv - center;
                float a = atan(p.y, p.x);
                int N = 3;
                float r = TWO_PI/float(N);
                return cos(floor(0.5 + a/r)*r - a) * length(p);
            }

            void main() {
                float tri1 = triangleSDF(vUv, vec2(0.2,0.2));
                float tri2 = triangleSDF(vUv, vec2(0.8,0.8));

                float d = min(tri1, tri2);

                vec3 color = vec3(1.0 - smoothstep(0.05,0.051,d));
                gl_FragColor = vec4(color,1.0);
            } 
        `

        const fragmentShader23 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;

            float triangleSDF(vec2 uv, vec2 center, float rot){
                vec2 p = uv - center;
                float s = sin(rot);
                float c = cos(rot);
                p = mat2(c,-s,s,c)*p;
                float a = atan(p.y,p.x);
                int N = 3;
                float r = TWO_PI/float(N);

                return cos(floor(0.5 + a/r)*r - a) * length(p);
            }

            void main() {
                float tri1 = triangleSDF(vUv, vec2(0.2,0.2),0.0);
                float tri2 = triangleSDF(vUv, vec2(0.8,0.8),PI);

                float d = min(tri1, tri2);

                vec3 color = vec3(1.0 - smoothstep(0.05,0.051,d));
                gl_FragColor = vec4(color,1.0);
            } 
        `

        const fragmentShader24 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718

            varying vec2 vUv;

            float triangleSDF(vec2 p){

                float a = atan(p.y,p.x);

                int N = 3;
                float r = TWO_PI/float(N);

                return cos(floor(0.5+a/r)*r-a)*length(p);
            }

            void main(){

                vec2 p = vUv - 0.5;

                float r = length(p);
                float a = atan(p.y,p.x);

                float N = 6.0;
                float sector = TWO_PI/N;

                a = mod(a + sector*0.5, sector) - sector*0.5;

                p = vec2(cos(a), sin(a)) * r;

                float d = triangleSDF(p - vec2(0.3,0.0));

                vec3 color = vec3(1.0 - smoothstep(0.05,0.051,d));

                gl_FragColor = vec4(color,1.0);
            }
        `

        const fragmentShader25 = `
#define PI 3.1415926
#define TAU 6.2831853

varying vec2 vUv;

float sdCircle(vec2 p, float r)
{
    return length(p) - r;
}

float sdRing(vec2 p, float r, float w)
{
    return abs(length(p)-r)-w;
}

float sdTriangle(vec2 p)
{
    float a = atan(p.y,p.x);
    float r = TAU/3.0;

    return cos(floor(0.5+a/r)*r-a)*length(p);
}

vec2 polarRepeat(vec2 p, float n)
{
    float r = length(p);
    float a = atan(p.y,p.x);

    float sector = TAU/n;

    a = mod(a + sector*0.5, sector) - sector*0.5;

    return vec2(cos(a),sin(a))*r;
}

void main()
{
    vec2 p = vUv - 0.5;

    // 三圆
    vec2 q = polarRepeat(p,3.0);
    float circles = sdCircle(q - vec2(0.0,0.18),0.16);

    // 三角形
    float a = atan(p.y,p.x) + PI;
    vec2 rp = vec2(cos(a),sin(a))*length(p);
    float tri = sdTriangle(rp*1.2);

    // 圆减三角
    float shape = max(circles,-tri);

    // 外环
    float ring = sdRing(p,0.42,0.01);

    float d = min(shape, ring);

    float col = 1.0 - smoothstep(0.0,0.002,d);

    gl_FragColor = vec4(vec3(col),1.0);
}
