<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Shader Combined Demo</title>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #011936;
        }

        #threejs {
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="threejs"></div>
    <script>
        const container = $('#threejs');
        const width = container.width();
        const height = container.height();

        const scene = new THREE.Scene();

        // 调整摄像机位置以容纳两个平面
        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
        camera.position.set(0, 50, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.update();

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 公共 Vertex Shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // Shader 1: 来自 p1.html (线性 y = x)
        const fragmentShader1 = `
            #define PI 3.14159265359
            varying vec2 vUv;
            uniform float u_time;
            vec3 colorA = vec3(0.149,0.141,0.912);
            vec3 colorB = vec3(1.000,0.833,0.224);
            void main() {
                vec3 bgColor = vec3(0.0);
                float pct = 1.0 - cos((u_time * PI) * 0.5);
                vec3 color = mix(colorA, colorB, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader1,
            uniforms: {
                u_time: { value: 0.0 }
            }
        });

        const geometry = new THREE.PlaneGeometry(10, 10);
        const mesh1 = new THREE.Mesh(geometry, material);
        mesh1.rotation.x = -Math.PI / 2;
        mesh1.position.x = -6; // 往左移
        scene.add(mesh1);

        // const fragmentShader2 = `
        //     #define PI 3.14159265359
        //     varying vec2 vUv;
        //     void main() {
        //         vec3 bgColor = vec3(abs(vUv.x));
        //         vec3 lineColor = vec3(0.0, 1.0, 0.0);

        //         float p = pow(cos(PI * (vUv.x * 2.0 - 1.0) / 2.0), 3.0);
        //         float pct = 1.0 - step(0.015, abs(p - vUv.y));
        //         vec3 color = mix(bgColor, lineColor, pct);

        //         gl_FragColor = vec4(color, 1.0);
        //     }
        // `;

        const fragmentShader2 = `
            #define PI 3.14159265359
            varying vec2 vUv;

            // HSL 转 RGB
            vec3 hsl2rgb(float h, float s, float l) {
                vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
                return l + s * (rgb - 0.5) * (1.0 - abs(2.0 * l - 1.0));
            }

            // HSB 转 RGB
            vec3 hsb2rgb( in vec3 c ){
                vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                                         6.0)-3.0)-1.0,
                                 0.0,
                                 1.0 );
                rgb = rgb*rgb*(3.0-2.0*rgb);
                return c.z * mix( vec3(1.0), rgb, c.y);
            }

            void main() {
                vec3 bgColor = vec3(abs(vUv.x));
                vec3 lineColor = hsb2rgb(vec3(vUv.x, 1.0, 1.0));

                float p = pow(cos(PI * (vUv.x * 2.0 - 1.0) / 2.0), 2.0);
                float pct = smoothstep(p-0.01,p,vUv.y) - smoothstep(p,p+0.01,vUv.y);
                vec3 color = mix(bgColor, lineColor, pct);

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader3 = `
            #define PI 3.14159265359
            varying vec2 vUv;
            // HSB 转 RGB
            vec3 hsb2rgb( in vec3 c ){
                vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                                         6.0)-3.0)-1.0,
                                 0.0,
                                 1.0 );
                rgb = rgb*rgb*(3.0-2.0*rgb);
                return c.z * mix( vec3(1.0), rgb, c.y);
            }

            void main() {
                vec2 toCenter = vec2(0.5) - vUv;
                float angle = atan(toCenter.y, toCenter.x);
                float radius = length(toCenter)*2.0;
                vec3 color = hsb2rgb(vec3(angle / (2.0 * PI) + 0.5, radius, 1.0));
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const material2 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader2,
            uniforms: {
                u_time: { value: 0.0 }
            }
        });

        const mesh2 = new THREE.Mesh(geometry, material2);
        mesh2.rotation.x = -Math.PI / 2;
        mesh2.position.x = 6; // 往右移
        scene.add(mesh2);

        const fragmentShader4 = `
            #define PI 3.14159265359
            varying vec2 vUv;
            // HSB 转 RGB
            vec3 hsb2rgb( in vec3 c ){
                vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                                         6.0)-3.0)-1.0,
                                 0.0,
                                 1.0 );
                rgb = rgb*rgb*(3.0-2.0*rgb);
                return c.z * mix( vec3(1.0), rgb, c.y);
            }

            void main() {
                vec2 toCenter = vec2(0.5) - vUv;
                float angle = atan(toCenter.y, toCenter.x);
                float radius = length(toCenter)*2.0;

                // 计算色相和饱和度（饱和度可以用半径表示，越往外越鲜艳）
                vec3 color = hsb2rgb(vec3(angle / (2.0 * PI) + 0.5, radius, 1.0));

                // 创建一个平滑的圆形遮罩，半径大于 1.0 的部分变成背景色
                vec3 bgColor = vec3(0.0); // 黑色背景
                float pct = smoothstep(1.0, 0.98, radius);
                color = mix(bgColor, color, pct);

                gl_FragColor = vec4(color, 1.0);
            }
        `;


        const material4 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader4,
            uniforms: {
                u_time: { value: 0.0 }
            }
        });

        const mesh4 = new THREE.Mesh(geometry, material4);
        mesh4.rotation.x = -Math.PI / 2;
        mesh4.position.x = 6; // 往右移
        scene.add(mesh4);


        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.u_time.value = clock.getElapsedTime();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.width();
            const height = container.height();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>

</html>
