<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Shader Combined Demo</title>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="./voronoi.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #011936;
        }

        #threejs {
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }

        #camera-info {
            position: fixed;
            left: 20px;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-radius: 5px;
            border: 1px solid #00ff00;
            line-height: 1.6;
            z-index: 1000;
            min-width: 150px;
        }

        #camera-info .label {
            color: #00ccff;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="threejs"></div>
    <div id="camera-info">
        <div><span class="label">Camera Position:</span></div>
        <div>X: <span id="cam-x">0</span></div>
        <div>Y: <span id="cam-y">0</span></div>
        <div>Z: <span id="cam-z">0</span></div>
        <div style="margin-top: 8px;"><span class="label">Camera Target:</span></div>
        <div>X: <span id="target-x">0</span></div>
        <div>Y: <span id="target-y">0</span></div>
        <div>Z: <span id="target-z">0</span></div>
    </div>
    <script type="module">
        const container = $("#threejs");
        const width = container.width();
        const height = container.height();
        const scene = new THREE.Scene();

        // 调整摄像机位置以容纳两个平面
        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
        camera.position.set(5, 12, -12);
        camera.up.set(0, 0, -1);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
        });
        renderer.setSize(width, height);
        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        // 必须与 camera.lookAt 一致，否则update()会覆盖lookAt
        controls.target.set(5, 0, -12);
        controls.update();

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const material1 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs1,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry1 = new THREE.PlaneGeometry(10, 10);
        const mesh1 = new THREE.Mesh(geometry1, material1);
        mesh1.rotation.x = -Math.PI / 2;
        mesh1.position.set(-30, 0, -24);
        scene.add(mesh1);

        const material2 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs2,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry2 = new THREE.PlaneGeometry(10, 10);
        const mesh2 = new THREE.Mesh(geometry2, material2);
        mesh2.rotation.x = -Math.PI / 2;
        mesh2.position.set(-18, 0, -24);
        scene.add(mesh2);

        const material3 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs3,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry3 = new THREE.PlaneGeometry(10, 10);
        const mesh3 = new THREE.Mesh(geometry3, material3);
        mesh3.rotation.x = -Math.PI / 2;
        mesh3.position.set(-6, 0, -24);
        scene.add(mesh3);

        const material4 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs4,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry4 = new THREE.PlaneGeometry(10, 10);
        const mesh4 = new THREE.Mesh(geometry4, material4);
        mesh4.rotation.x = -Math.PI / 2;
        mesh4.position.set(6, 0, -24);
        scene.add(mesh4);

        const material5 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs5,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry5 = new THREE.PlaneGeometry(10, 10);
        const mesh5 = new THREE.Mesh(geometry5, material5);
        mesh5.rotation.x = -Math.PI / 2;
        mesh5.position.set(18, 0, -24);
        scene.add(mesh5);

        const material6 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs6,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry6 = new THREE.PlaneGeometry(10, 10);
        const mesh6 = new THREE.Mesh(geometry6, material6);
        mesh6.rotation.x = -Math.PI / 2;
        mesh6.position.set(30, 0, -24);
        scene.add(mesh6);

        const material7 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs7,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry7 = new THREE.PlaneGeometry(10, 10);
        const mesh7 = new THREE.Mesh(geometry7, material7);
        mesh7.rotation.x = -Math.PI / 2;
        mesh7.position.set(-30, 0, -12);
        scene.add(mesh7);

        const material8 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs8,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry8 = new THREE.PlaneGeometry(10, 10);
        const mesh8 = new THREE.Mesh(geometry8, material8);
        mesh8.rotation.x = -Math.PI / 2;
        mesh8.position.set(-18, 0, -12);
        scene.add(mesh8);

        const material9 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs9,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry9 = new THREE.PlaneGeometry(10, 10);
        const mesh9 = new THREE.Mesh(geometry9, material9);
        mesh9.rotation.x = -Math.PI / 2;
        mesh9.position.set(-6, 0, -12);
        scene.add(mesh9);

        const material10 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs10,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry10 = new THREE.PlaneGeometry(10, 10);
        const mesh10 = new THREE.Mesh(geometry10, material10);
        mesh10.rotation.x = -Math.PI / 2;
        mesh10.position.set(6, 0, -12);
        scene.add(mesh10);

        const material11 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fs11,
            uniforms: {
                u_time: { value: 0 },
                u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
            },
        });
        const geometry11 = new THREE.PlaneGeometry(10, 10);
        const mesh11 = new THREE.Mesh(geometry11, material11);
        mesh11.rotation.x = -Math.PI / 2;
        mesh11.position.set(18, 0, -12);
        scene.add(mesh11);


        function animate() {
            requestAnimationFrame(animate);
            material1.uniforms.u_time.value += 0.01;
            material6.uniforms.u_time.value += 0.01;

            // 更新相机参数显示
            document.getElementById('cam-x').textContent = camera.position.x.toFixed(2);
            document.getElementById('cam-y').textContent = camera.position.y.toFixed(2);
            document.getElementById('cam-z').textContent = camera.position.z.toFixed(2);
            document.getElementById('target-x').textContent = controls.target.x.toFixed(2);
            document.getElementById('target-y').textContent = controls.target.y.toFixed(2);
            document.getElementById('target-z').textContent = controls.target.z.toFixed(2);

            renderer.render(scene, camera);
        }

        animate();

        // 创建Raycaster用于检测鼠标与mesh的交点
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 鼠标移动事件监听
        renderer.domElement.addEventListener("mousemove", (event) => {
            // 获取canvas的边界矩形
            const rect = renderer.domElement.getBoundingClientRect();
            // 将鼠标坐标转换为标准化设备坐标 (-1 到 +1)
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;


        });

        window.addEventListener("resize", () => {
            const width = container.width();
            const height = container.height();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>

</html>
