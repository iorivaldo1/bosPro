<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Shader Combined Demo</title>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #011936;
        }

        #threejs {
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="threejs"></div>
    <script>
        const container = $('#threejs');
        const width = container.width();
        const height = container.height();

        const scene = new THREE.Scene();

        // 调整摄像机位置以容纳两个平面
        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
        camera.position.set(0, 50, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.update();

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 公共 Vertex Shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // Shader 1: 来自 p1.html (线性 y = x)
        const fragmentShader1 = `
            varying vec2 vUv;
            void main() {
                vec3 bgColor = vec3(vUv.x);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float pct = smoothstep(vUv.x - 0.2,vUv.x,vUv.y) - smoothstep(vUv.x - 0.01,vUv.x,vUv.y);
                // float pct = smoothstep(vUv.x - 0.2,vUv.x,vUv.y);
                // float pct = smoothstep(vUv.x - 0.01,vUv.x,vUv.y);
                vec3 color = mix(bgColor, lineColor, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader1a = `
            varying vec2 vUv;
            void main() {
                vec3 bgColor = vec3(vUv.x);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float pct = 1.0 - step(0.01, abs(vUv.y - vUv.x));
                vec3 color = mix(bgColor, lineColor, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // Shader 2: 来自 p2.html (指数 y = x^5)
        const fragmentShader2 = `
            varying vec2 vUv;
            void main() {
                float p = pow(vUv.x, 5.0);
                vec3 bgColor = vec3(p);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float pct = smoothstep(p-0.2,p,vUv.y) - smoothstep(p-0.01,p,vUv.y);
                // float pct = smoothstep(p-0.2,p,vUv.y);
                vec3 color = mix(bgColor, lineColor, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader2a = `
            varying vec2 vUv;
            void main() {
                vec3 bgColor = vec3(vUv.x);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float p =  pow(abs(vUv.x), 5.0);
                
                float pct = 1.0 - step(0.1, abs(p-vUv.y));
                vec3 color = mix(bgColor, lineColor, pct);
                // vec3 color = lineColor * pct  + bgColor;

                gl_FragColor = vec4(color, 1.0);
            }
        `;


        const fragmentShader3 = `
            varying vec2 vUv;
            void main() {
                float p = (exp(vUv.x) - 1.0) / (exp(1.0) - 1.0);
                vec3 bgColor = vec3(p);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float pct = smoothstep(p-0.2,p,vUv.y) - smoothstep(p-0.01,p,vUv.y);
                // float pct = smoothstep(p-0.2,p,vUv.y);
                vec3 color = mix(bgColor, lineColor, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader4 = `
            varying vec2 vUv;
            void main() {
                float p = step(0.5, vUv.x);
                vec3 bgColor = vec3(p);
                vec3 lineColor = vec3(0.0, 1.0, 0.0);
                float pct = 1.0 - step(0.01, abs(vUv.y - p));
                vec3 color = mix(bgColor, lineColor, pct);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // Material 1
        const material1 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader1,
        });

        const material1a = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader1a,
        });


        // Material 2
        const material2 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader2,
        });

        const material2a = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader2a,
        });

        const material3 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader3,
        });
        // 左平面 (p1)
        const geometry = new THREE.PlaneGeometry(10, 10);
        const mesh1 = new THREE.Mesh(geometry, material1);
        mesh1.rotation.x = -Math.PI / 2;
        mesh1.position.x = -6; // 往左移
        scene.add(mesh1);

        const geometry1a = new THREE.PlaneGeometry(10, 10);
        const mesh1a = new THREE.Mesh(geometry1a, material1a);
        mesh1a.rotation.x = -Math.PI / 2;
        mesh1a.position.x = -6; // 往左移
        mesh1a.position.z = 12; // 往左移
        scene.add(mesh1a);

        // 右平面 (p2)
        const mesh2 = new THREE.Mesh(geometry, material2);
        mesh2.rotation.x = -Math.PI / 2;
        mesh2.position.x = 6; // 往右移
        scene.add(mesh2);

        const mesh2a = new THREE.Mesh(geometry, material2a);
        mesh2a.rotation.x = -Math.PI / 2;
        mesh2a.position.x = 6; // 往右移
        mesh2a.position.z = 12; // 往左移
        scene.add(mesh2a);

        // 第三个平面 (p3)
        const mesh3 = new THREE.Mesh(geometry, material3);
        mesh3.rotation.x = -Math.PI / 2;
        mesh3.position.x = 18; // 居中
        scene.add(mesh3);

        const material4 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader4
        });



        const mesh4 = new THREE.Mesh(geometry, material4);
        mesh4.rotation.x = -Math.PI / 2;
        mesh4.position.x = 30; // 居中
        scene.add(mesh4);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.width();
            const height = container.height();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>

</html>
