        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // 公共 Vertex Shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader1 = `
            varying vec2 vUv;
            uniform float u_time;
            float box(vec2 vUv, vec2 size){
                size = vec2(0.5) - size*0.5;
                vec2 uv = smoothstep(size,size + vec2(0.001),vUv);
                uv *= smoothstep(size,size + vec2(0.001),vec2(1.0) - vUv);

                return uv.x*uv.y;
            }
            
            float crossf(vec2 vUv,float size){
                return box(vUv,vec2(size,size/4.0)) + box(vUv,vec2(size/4.0,size));
            }

            void main() {
                vec2 pos = vUv;
                vec3 color = vec3(0.0);
                vec2 translate = vec2(cos(u_time),sin(u_time));
                pos += translate*0.35;
                
                color = vec3(pos.x,pos.y,0.0);
                color += vec3(crossf(pos,0.25));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader2 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;
            uniform float u_time;

            float triangleSDF(vec2 uv, vec2 center){
                vec2 p = uv - center;
                float a = atan(p.y, p.x);
                int N = 3;
                float r = TWO_PI/float(N);
                return cos(floor(0.5 + a/r)*r - a) * length(p);
            }


            void main() {
                vec2 pos = vUv;
                vec3 color = vec3(0.0);
                vec2 translate = vec2(cos(u_time),sin(u_time));
                pos += translate*0.15;
                float tri1 = triangleSDF(pos, vec2(0.2,0.2));
                color = vec3(pos.x,pos.y,0.0);
                color += vec3(1.0 - smoothstep(0.05,0.051,tri1));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader3 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;
            uniform float u_time;

            float triangleSDF(vec2 uv, vec2 center){
                vec2 p = uv - center;
                float a = atan(p.y, p.x);
                int N = 5;
                float r = TWO_PI/float(N);
                return cos(floor(0.5 + a/r)*r - a) * length(p);
            }


            void main() {
                vec2 pos = vUv;
                vec3 color = vec3(0.0);
                vec2 translate = vec2(fract(u_time * 0.05 ),0.5 + sin(u_time * 1.0) * 0.2);
                
                float pg1 = triangleSDF(pos,translate);
                color += vec3(1.0 - smoothstep(0.1,0.1,pg1));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader4 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;
            uniform float u_time;

            mat2 rotate2d(float angle){
                return mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
            }

            float triangleSDF(vec2 uv, vec2 center){
                vec2 p = uv - center;
                float a = atan(p.y, p.x);
                int N = 5;
                float r = TWO_PI/float(N);
                return cos(floor(0.5 + a/r)*r - a) * length(p);
            }

            void main() {
                vec2 pos = vUv;
                vec3 color = vec3(0.0);
                
                vec2 pivot = vec2(0.5, 0.9);  
                vec2 center = vec2(0.5, 0.5); 
                float swingAngle = sin(u_time * 0.3) * (PI / 4.0);

                pos = pos - pivot;
                pos = rotate2d(swingAngle) * pos;
                pos = pos +  pivot;

                float pg1 = triangleSDF(pos, center);
                color += vec3(1.0 - smoothstep(0.1, 0.11, pg1));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const fragmentShader13 = `
            #define PI 3.1415926535
            #define TWO_PI 6.28318530718
            varying vec2 vUv;
            uniform float u_time;

            float angularCircleSDF(vec2 uv, vec2 center, float radius, float startAngle, float arcAngle){
                vec2 p = uv - center;
                
                float angle = atan(p.y, p.x);
                // step(0.0, -angle) 的意思是：如果 angle 是负数，返回 1.0；如果是正数，返回 0.0
                // 这样负数就会加上 TWO_PI，正数加上 0
                // 可以完美、无缝地把 -PI 到 PI 的范围映射到 0 到 2PI
                angle += step(0.0,-angle)*TWO_PI;

                float diffAngle = angle - startAngle;
                diffAngle += step(0.0, -diffAngle) * TWO_PI;
                
                float circleDist = length(p) - radius;
                float angleDist = step(arcAngle, diffAngle) * 1000.0; 

                return max(circleDist, angleDist);
            }

            mat2 rotate2d(float angle){
                return mat2(cos(angle),-sin(angle),sin(angle),cos(angle));
            }

            void main() {
                vec2 pos = vUv;
                vec3 color = vec3(0.0);

                vec2 center = vec2(0.5, 0.5);
                float pg1 = angularCircleSDF(pos, center, 0.3, u_time * 0.2, PI/2.0);

                color += vec3(1.0 - smoothstep(0.05, 0.051, pg1));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

            material14.uniforms.u_time.value += 0.01;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.width();
            const height = container.height();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>

</html>
