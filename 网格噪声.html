    animate();

    // 创建Raycaster用于检测鼠标与mesh的交点
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // 鼠标移动事件监听
    renderer.domElement.addEventListener("mousemove", (event) => {
      // 获取canvas的边界矩形
      const rect = renderer.domElement.getBoundingClientRect();
      // 将鼠标坐标转换为标准化设备坐标 (-1 到 +1)
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      // 更新射线
      raycaster.setFromCamera(mouse, camera);

      // 分别检测与每个mesh的交点
      const intersects1 = raycaster.intersectObject(mesh1);
      const intersects2 = raycaster.intersectObject(mesh2);
      const intersects3 = raycaster.intersectObject(mesh3);
      const intersects6 = raycaster.intersectObject(mesh6);
      // 更新mesh1的unifor-m
      if (intersects1.length > 0) {
        const uv = intersects1[0].uv;
        if (uv) {
          material1.uniforms.u_mouse.value.set(uv.x, uv.y);
        }
      }

      // 更新mesh2的uniform
      if (intersects2.length > 0) {
        const uv = intersects2[0].uv;
        if (uv) {
          material2.uniforms.u_mouse.value.set(uv.x, uv.y);
        }
      }

      // 更新mesh3的uniform

        }
      }

        const uv = intersects6[0].uv;
        if (uv) {
          material6.uniforms.u_mouse.value.set(uv.x, uv.y);
        }
      }
    });

    window.addEventListener("resize", () => {
      const width = container.width();
      const height = container.height();
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });
