<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Shader Combined Demo</title>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="./网格噪声.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #011936;
      }

      #threejs {
        position: relative;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="threejs"></div>
    <script type="module">
      const container = $("#threejs");
      const width = container.width();
      const height = container.height();
      const scene = new THREE.Scene();

      // 调整摄像机位置以容纳两个平面
      const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
      camera.position.set(0, 60, 0);
      camera.up.set(0, 0, -1);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(width, height);
      container.append(renderer.domElement);
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      // 必须与 camera.lookAt 一致，否则update()会覆盖lookAt
      controls.target.set(0, 0, 0);
      controls.update();

      const ambientLight = new THREE.AmbientLight(0x404040);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);

      const material1 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader1,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry1 = new THREE.PlaneGeometry(10, 10);
      const mesh1 = new THREE.Mesh(geometry1, material1);
      mesh1.rotation.x = -Math.PI / 2;
      mesh1.position.set(-24, 0, -28);
      scene.add(mesh1);

      const material2 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader2,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry2 = new THREE.PlaneGeometry(10, 10);
      const mesh2 = new THREE.Mesh(geometry2, material2);
      mesh2.rotation.x = -Math.PI / 2;
      mesh2.position.set(-12, 0, -28);
      scene.add(mesh2);

      const material3 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader3,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry3 = new THREE.PlaneGeometry(10, 10);
      const mesh3 = new THREE.Mesh(geometry3, material3);
      mesh3.rotation.x = -Math.PI / 2;
      mesh3.position.set(0, 0, -28);
      scene.add(mesh3);

      const material4 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader4,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry4 = new THREE.PlaneGeometry(10, 10);
      const mesh4 = new THREE.Mesh(geometry4, material4);
      mesh4.rotation.x = -Math.PI / 2;
      mesh4.position.set(12, 0, -28);
      scene.add(mesh4);

      const material5 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader5,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry5 = new THREE.PlaneGeometry(10, 10);
      const mesh5 = new THREE.Mesh(geometry5, material5);
      mesh5.rotation.x = -Math.PI / 2;
      mesh5.position.set(24, 0, -28);
      scene.add(mesh5);

      const material6 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader6,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(-0.1, -0.1) },
        },
      });
      const geometry6 = new THREE.PlaneGeometry(10, 10);
      const mesh6 = new THREE.Mesh(geometry6, material6);
      mesh6.rotation.x = -Math.PI / 2;
      mesh6.position.set(-24, 0, -16);
      scene.add(mesh6);

      const material7 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader7,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry7 = new THREE.PlaneGeometry(10, 10);
      const mesh7 = new THREE.Mesh(geometry7, material7);
      mesh7.rotation.x = -Math.PI / 2;
      mesh7.position.set(-12, 0, -16);
      scene.add(mesh7);

      const material8 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader8,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry8 = new THREE.PlaneGeometry(10, 10);
      const mesh8 = new THREE.Mesh(geometry8, material8);
      mesh8.rotation.x = -Math.PI / 2;
      mesh8.position.set(0, 0, -16);
      scene.add(mesh8);

      const material9 = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader9,
        uniforms: {
          u_time: { value: 0 },
          u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
        },
      });
      const geometry9 = new THREE.PlaneGeometry(10, 10);
      const mesh9 = new THREE.Mesh(geometry9, material9);
      mesh9.rotation.x = -Math.PI / 2;
      mesh9.position.set(12, 0, -16);
      scene.add(mesh9);

      function animate() {
        requestAnimationFrame(animate);
        material1.uniforms.u_time.value += 0.01;
        material4.uniforms.u_time.value += 0.01;
        material6.uniforms.u_time.value += 0.01;
        material7.uniforms.u_time.value += 0.01;
        material8.uniforms.u_time.value += 0.01;

        renderer.render(scene, camera);
      }

      animate();

      // 创建Raycaster用于检测鼠标与mesh的交点
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      // 鼠标移动事件监听
      renderer.domElement.addEventListener("mousemove", (event) => {
        // 获取canvas的边界矩形
        const rect = renderer.domElement.getBoundingClientRect();
        // 将鼠标坐标转换为标准化设备坐标 (-1 到 +1)
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        // 更新射线
        raycaster.setFromCamera(mouse, camera);

        // 分别检测与每个mesh的交点
        const intersects1 = raycaster.intersectObject(mesh1);
        const intersects2 = raycaster.intersectObject(mesh2);
        const intersects3 = raycaster.intersectObject(mesh3);
        const intersects6 = raycaster.intersectObject(mesh6);
        // 更新mesh1的uniform
        if (intersects1.length > 0) {
          const uv = intersects1[0].uv;
          if (uv) {
            material1.uniforms.u_mouse.value.set(uv.x, uv.y);
          }
        }

        // 更新mesh2的uniform
        if (intersects2.length > 0) {
          const uv = intersects2[0].uv;
          if (uv) {
            material2.uniforms.u_mouse.value.set(uv.x, uv.y);
          }
        }

        // 更新mesh3的uniform
        if (intersects3.length > 0) {
          const uv = intersects3[0].uv;
          if (uv) {
            material3.uniforms.u_mouse.value.set(uv.x, uv.y);
          }
        }

        // 更新mesh6的uniform
        if (intersects6.length > 0) {
          const uv = intersects6[0].uv;
          if (uv) {
            material6.uniforms.u_mouse.value.set(uv.x, uv.y);
          }
        }
      });

      window.addEventListener("resize", () => {
        const width = container.width();
        const height = container.height();
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      });
    </script>
  </body>
</html>
