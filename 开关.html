<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Shader Combined Demo</title>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="./开关.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #011936;
        }

        #threejs {
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="threejs"></div>
    <script>
        const container = $('#threejs');
        const width = container.width();
        const height = container.height();
        const scene = new THREE.Scene();

        // 调整摄像机位置以容纳两个平面
        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
        camera.position.set(0, 60, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        container.append(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0); // 必须与 camera.lookAt 一致，否则update()会覆盖lookAt
        controls.update();

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const material1 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader1,
            uniforms: {
                u_time: { value: 0 }
            }
        });

        const geometry1 = new THREE.PlaneGeometry(10, 10);
        const mesh1 = new THREE.Mesh(geometry1, material1);
        mesh1.rotation.x = -Math.PI / 2;
        mesh1.position.set(-24, 0, -28);
        scene.add(mesh1);

        const material2 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader2,
            uniforms: {
                u_time: { value: 0 }
            }
        });

        const geometry2 = new THREE.PlaneGeometry(10, 10);
        const mesh2 = new THREE.Mesh(geometry2, material2);
        mesh2.rotation.x = -Math.PI / 2;
        mesh2.position.set(-12, 0, -28);
        scene.add(mesh2);

        const material3 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader3,
            uniforms: {
                u_time: { value: 0 }
            }
        });

        const geometry3 = new THREE.PlaneGeometry(10, 10);
        const mesh3 = new THREE.Mesh(geometry3, material3);
        mesh3.rotation.x = -Math.PI / 2;
        mesh3.position.set(0, 0, -28);
        scene.add(mesh3);

        const material4 = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader4,
            uniforms: {
                u_time: { value: 0 }
            }
        });

        const geometry4 = new THREE.PlaneGeometry(10, 10);
        const mesh4 = new THREE.Mesh(geometry4, material4);
        mesh4.rotation.x = -Math.PI / 2;
        mesh4.position.set(12, 0, -28);
        scene.add(mesh4);

        function animate() {
            requestAnimationFrame(animate);
            material1.uniforms.u_time.value += 0.01;
            material2.uniforms.u_time.value += 0.01;
            material3.uniforms.u_time.value += 0.01;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.width();
            const height = container.height();
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>

</html>
